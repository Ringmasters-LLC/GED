name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate schemas and data
        run: pnpm run validate
      - name: Build dist and packages
        run: pnpm run build
      - name: Run Tests
        run: pnpm test
      - name: Dry Run Publish
        run: pnpm --filter @ringmasters/global-entry-data publish --dry-run
