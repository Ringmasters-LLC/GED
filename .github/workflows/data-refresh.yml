name: Data Refresh

on:
  schedule:
    - cron: '0 0 1 * *' # Run on the first of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Data Refresh Script
        run: echo "Data refresh script would run here."
      - name: Validate New Data
        run: pnpm run validate
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'data: automated monthly data refresh'
          title: 'Automated Data Refresh'
          body: 'This is an automated pull request to refresh canonical datasets.'
          branch: 'data-refresh'
